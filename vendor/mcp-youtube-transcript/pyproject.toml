[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

[project]
name = "mcp-youtube-transcript"
version = "0.7.0"
description = "MCP server retrieving transcripts of YouTube videos"
readme = "README.md"
authors = [
    { name = "Junpei Kawamoto", email = "kawamoto.junpei@gmail.com" },
]
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "beautifulsoup4>=4.13.3",
    "mcp>=1.9",
    "pydantic>=2.10.6",
    "requests>=2.32.3",
    "rich-click>=1.8.8",
    "youtube-transcript-api>=1.1",
    "yt-dlp>=2025.9.26",
]
scripts.mcp-youtube-transcript = "mcp_youtube_transcript.cli:main"

[dependency-groups]
dev = [
    "bump-my-version>=1.1.1",
    "pre-commit>=4.1",
    "pre-commit-uv>=4.1.4",
    "pytest>=8.3.5",
    "pytest-mock>=3.14",
    "pytest-recording>=0.13.4",
    "types-requests>=2.32.0.20250306",
]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.pyproject-fmt]
indent = 4

[tool.mypy]
disallow_untyped_defs = true
warn_return_any = true
warn_unused_configs = true
overrides = [ { module = [
    "yt_dlp.*",
], ignore_missing_imports = true } ]

[tool.bumpversion]
current_version = "0.7.0"
commit = true
files = [
    { replace = 'version = "{new_version}"', filename = "pyproject.toml", search = 'version = "{current_version}"' },
    { replace = '"version": "{new_version}"', filename = "manifest.json", search = '"version": "{current_version}"' },
    { replace = '"version": "{new_version}"', filename = "server.json", search = '"version": "{current_version}"' },
    { replace = "download/v{new_version}", filename = "server.json", search = "download/v{current_version}" },
]
pre_commit_hooks = [
    "uv sync",
    "git add uv.lock",
]
